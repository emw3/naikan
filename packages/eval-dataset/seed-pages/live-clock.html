<!doctype html>
<!--
  Seed page: live-clock  →  label: noise
  No variant switch: the page renders the wall-clock time + a request id at load.
  Two sequential captures (seconds apart) differ ONLY in the timestamp region —
  a small, content-driven diff that is NOT a regression. Time is read from
  Date.now() so the two captures are guaranteed to differ by construction.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Status — All systems operational</title>
    <style>
      :root { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
      body { margin: 0; background: #0b1220; color: #e6edf6; }
      main { max-width: 720px; margin: 0 auto; padding: 72px 32px; }
      .badge { display: inline-flex; align-items: center; gap: 8px; background: #0f2e1d;
               color: #4ade80; padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
      h1 { font-size: 30px; margin: 20px 0 6px; }
      .meta { color: #93a4bd; font-size: 14px; }
      .panel { margin-top: 32px; background: #111a2e; border: 1px solid #1e2c47; border-radius: 12px; }
      .row { display: flex; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #1e2c47; }
      .row:last-child { border-bottom: 0; }
      .ok { color: #4ade80; font-weight: 600; font-size: 14px; }
      .stats { display: flex; gap: 16px; margin-top: 28px; }
      .stat { flex: 1; background: #111a2e; border: 1px solid #1e2c47; border-radius: 12px; padding: 18px 20px; }
      .stat .label { color: #6b7c99; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
      .stat .value { font-size: 30px; font-weight: 700; margin-top: 6px; color: #e6edf6;
                     font-variant-numeric: tabular-nums; }
      .stat .value.live { color: #38bdf8; }
      .stamp { margin-top: 24px; color: #93a4bd; font-size: 14px; font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body>
    <main>
      <span class="badge"><span class="dot"></span> All systems operational</span>
      <h1>Northwind Status</h1>
      <p class="meta">Live view of our production services.</p>
      <div class="panel">
        <div class="row"><span>API</span><span class="ok">Operational</span></div>
        <div class="row"><span>Dashboard</span><span class="ok">Operational</span></div>
        <div class="row"><span>Webhooks</span><span class="ok">Operational</span></div>
        <div class="row"><span>Background jobs</span><span class="ok">Operational</span></div>
      </div>
      <div class="stats">
        <div class="stat"><div class="label">Uptime (90d)</div><div class="value">99.98%</div></div>
        <div class="stat"><div class="label">Requests today</div><div class="value live" id="reqs"></div></div>
        <div class="stat"><div class="label">Checked</div><div class="value live" id="clock"></div></div>
      </div>
      <p class="stamp" id="stamp"></p>
    </main>
    <script>
      // The live counters + clock vary every load — a prominent but obviously
      // content-driven diff (the canonical "ticking value", not a regression).
      var now = new Date();
      var reqs = 480000 + (now.getTime() % 60000); // 6-digit live counter
      document.getElementById("reqs").textContent = reqs.toLocaleString("en-US");
      document.getElementById("clock").textContent =
        String(now.getUTCHours()).padStart(2, "0") + ":" +
        String(now.getUTCMinutes()).padStart(2, "0") + ":" +
        String(now.getUTCSeconds()).padStart(2, "0");
      var rid = (now.getTime() % 1000000).toString(36).toUpperCase();
      document.getElementById("stamp").textContent =
        "Last checked " + now.toUTCString() + "  ·  request " + rid;
    </script>
  </body>
</html>
